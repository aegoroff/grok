[tools]
zig = "0.16.0"

[tasks."build:zig"]
description = "Build project"
shell = "bash -c"
run = [
  """
    [[ -n "${ABI}" ]] || ABI=musl
    [[ -n "${OS}" ]] || OS=linux
    [[ -n "${ARCH}" ]] || ARCH=x86_64
    [[ -n "${VERSION}" ]] || VERSION="0.4.0-dev"

    ZIG_PREFIX_DIR=bin-${ARCH}-${OS}-${ABI}
    OPTIMIZE=ReleaseFast
    TARGET="${ARCH}-${OS}-${ABI}"

    DCPU=""
    [[ -n "${CPU}" ]] && DCPU=-Dcpu="${CPU}"

    echo "--- Step: Build ---"
    zig build -Doptimize=${OPTIMIZE} ${DCPU} -Dtarget="$TARGET" -Dversion="${VERSION}" --summary all --prefix-exe-dir "${ZIG_PREFIX_DIR}"
  """
]